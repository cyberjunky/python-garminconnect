name: CI

"on":
  push:
    branches:
      - main
      - master
      - revamp
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pdm
          pdm install --group :all

      - name: Lint with ruff
        run: |
          pdm run ruff check .

      - name: Format check with ruff
        run: |
          pdm run ruff format --check .

      - name: Type check with mypy
        run: |
          pdm run mypy garminconnect --ignore-missing-imports

      - name: Test with pytest
        run: |
          pdm run pytest tests/ -v --tb=short --vcr-record=none

      - name: Generate coverage report
        if: matrix.python-version == '3.12'
        run: |
          pdm run coverage run -m pytest tests/ --vcr-record=none
          pdm run coverage xml

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-xml
          path: coverage.xml

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pdm
          pdm install --prod --group security

      - name: Security check with bandit
        run: |
          bandit -r garminconnect demo.py example.py test_strategy.py -ll

      - name: Dependency vulnerability audit
        run: |
          pdm run pip-audit
